# electron-builder configuration for EZOffice
# Windows installer and portable builds

appId: com.ezoffice.app
productName: EZOffice

publish:
  provider: github
  owner: Reef-hash
  repo: EZOffice

directories:
  buildResources: build/assets
  output: dist

files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*

win:
  target:
    - nsis
    - portable
  certificateFile: null
  certificatePassword: null
  sign: null

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: EZOffice
