# electron-builder configuration for EZOffice — REFERENCE ONLY, NOT LOADED.
# electron-builder reads config from package.json's "build" field first; if that
# field exists (it does), this file is never read (see node_modules/app-builder-lib/
# out/util/config/load.js). Editing this file has no effect on the actual build —
# 2026-07-11 incident: releaseType: release was added here instead of package.json's
# build.publish, so tagged builds kept publishing as invisible GitHub drafts. Make
# every change to package.json's "build" field, then mirror it here for readability.

appId: com.ezoffice.app
productName: EZOffice

publish:
  provider: github
  owner: Reef-hash
  repo: EZOffice
  # Without this, electron-builder defaults to releaseType: draft — the release
  # is uploaded but stays hidden from the public /releases page until someone
  # manually publishes it on GitHub. 'release' auto-publishes immediately so
  # tagged versions (vX.Y.Z) show up right away for clients and the auto-updater.
  releaseType: release

directories:
  buildResources: build/assets
  output: dist

files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*

extraResources:
  - from: electron/db/migrations
    to: db/migrations

win:
  target:
    - nsis
    - portable
  certificateFile: null
  certificatePassword: null
  sign: null

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: EZOffice
