# EZOffice — GitHub Actions CI/CD
# Auto-build and release Windows installer + portable on tag push.

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Release + upload assets

jobs:
  build:
    name: Build & Release Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build App
        run: npm run build
        env:
          # Baked into dist-electron/main.js at build time by vite.config.ts's
          # loadEnv/define — a packaged installer never ships a .env file, so
          # without these set here the compiled app ships with blank licensing
          # config and every activation attempt fails with "Licensing
          # configuration missing" (2026-07-11 incident, v0.2.0-v0.2.2 releases
          # were all built without these set). Must be defined as repository
          # secrets in GitHub: Settings -> Secrets and variables -> Actions.
          EZOFFICE_LICENSING_API_URL: ${{ secrets.EZOFFICE_LICENSING_API_URL }}
          EZOFFICE_SUPABASE_URL: ${{ secrets.EZOFFICE_SUPABASE_URL }}
          EZOFFICE_SUPABASE_ANON_KEY: ${{ secrets.EZOFFICE_SUPABASE_ANON_KEY }}

      - name: Build & Publish Release
        run: npx electron-builder --win --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
